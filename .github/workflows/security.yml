name: Security Scan (Snyk)

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]
  schedule:
    # Monday 4 AM UTC
    - cron: '0 4 * * 1'

jobs:
  snyk:
    name: Snyk vulnerability scan
    runs-on: ubuntu-latest
    continue-on-error: true   # baseline — remove after first triage pass
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        # Version is sourced from package.json's `packageManager` field —
        # specifying it here as well now causes pnpm/action-setup@v4 to
        # error with "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Snyk test (high/critical fail; medium warn-only)
        uses: snyk/actions/node@master
        continue-on-error: true   # baseline triage pass — tighten after first run
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Snyk monitor (track in Snyk dashboard)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor

  portal-leak-guard:
    name: Portal leak guard (no internal economics in customer code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Source check — no internal fields in portal code
        run: node scripts/check-portal-leaks.mjs

      - name: Runtime guard + scanner tests
        run: pnpm vitest run shared/portalSerializers.test.ts server/portalLeakGuard.test.ts
